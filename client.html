<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #e9eef5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container{
            width: 450px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .header{
            background: #2563eb;
            color:white;
            padding: 18px;
            text-align: center;
        }

        #c{
            width: 100%;
            height: 400px;
            border: none;
            resize: none;
            padding: 15px;
            outline: none;
            font-size: 15px;
            background: #f8f9fa;
        }

        .input-area{
            display: flex;
            padding: 12px;
            gap: 10px;
            background: white;
        }

        #m:focus{
            border-color: #2563eb;
            outline: none;
        }

        button{
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="chat-container">

        <div class="header">
            <h2>Chat Room</h2>
        </div>

         <textarea id="c" readonly></textarea>

        <div class="input-area">
            <input type="text" id="m" placeholder="Type message..." />
            <button onclick="send()">SEND</button>
        </div>
    
    </div>


        


    <script>
        const c = document.getElementById("c");
        const m = document.getElementById("m");
        const username = prompt("Enter your username: ");
        const ws = new WebSocket("ws://localhost:6789");

        ws.onmessage = e => c.value += e.data + "\n";

        function send() {
            const txt = m.value.trim();
            if (txt === "") return;
            ws.send(username + ": " + txt);
            c.value += "<You>:" + txt + "\n";
            m.value = "";
        }
    </script>
</body>
</html>
